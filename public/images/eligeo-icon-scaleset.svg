<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">

  <!-- Background -->
  <rect width="520" height="140" fill="#f8fafc"/>

  <!-- Label -->
  <text x="10" y="18" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Favicon test — same icon at 64px · 32px · 16px</text>

  <!-- ══════════════════════
       64x64 version
  ══════════════════════ -->
  <rect x="10" y="28" width="64" height="64" rx="13" fill="#0F172A"/>
  <!-- Left -->
  <circle cx="24" cy="52" r="5" fill="white" opacity="0.28"/>
  <path d="M 17 66 Q 24 61 31 66" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.28"/>
  <!-- Right -->
  <circle cx="60" cy="52" r="5" fill="white" opacity="0.28"/>
  <path d="M 53 66 Q 60 61 67 66" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.28"/>
  <!-- Center selected -->
  <circle cx="42" cy="50" r="14" fill="#6366F1" opacity="0.12"/>
  <circle cx="42" cy="50" r="12" fill="none" stroke="#6366F1" stroke-width="2"/>
  <circle cx="42" cy="50" r="7.5" fill="white"/>
  <path d="M 31 66 Q 42 60 53 66" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Badge -->
  <circle cx="51" cy="59" r="5" fill="#0F172A"/>
  <circle cx="51" cy="59" r="4.2" fill="#6366F1"/>
  <path d="M 48.8 59 L 50.6 60.8 L 53.8 57" fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label -->
  <text x="26" y="104" font-family="Arial, sans-serif" font-size="11" fill="#64748b">64px</text>

  <!-- ══════════════════════
       32x32 version
  ══════════════════════ -->
  <rect x="110" y="44" width="32" height="32" rx="7" fill="#0F172A"/>
  <!-- Left -->
  <circle cx="117" cy="56" r="2.8" fill="white" opacity="0.3"/>
  <!-- Right -->
  <circle cx="135" cy="56" r="2.8" fill="white" opacity="0.3"/>
  <!-- Center selected -->
  <circle cx="126" cy="55" r="7" fill="#6366F1" opacity="0.15"/>
  <circle cx="126" cy="55" r="6" fill="none" stroke="#6366F1" stroke-width="1.5"/>
  <circle cx="126" cy="55" r="3.5" fill="white"/>
  <!-- Badge -->
  <circle cx="130.5" cy="59.5" r="2.8" fill="#6366F1"/>
  <path d="M 129.2 59.5 L 130.3 60.6 L 132.2 58.2" fill="none" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Label -->
  <text x="112" y="88" font-family="Arial, sans-serif" font-size="11" fill="#64748b">32px</text>

  <!-- ══════════════════════
       16x16 version
  ══════════════════════ -->
  <rect x="182" y="52" width="16" height="16" rx="3.5" fill="#0F172A"/>
  <!-- Left dot -->
  <circle cx="185.5" cy="59" r="1.4" fill="white" opacity="0.35"/>
  <!-- Right dot -->
  <circle cx="194.5" cy="59" r="1.4" fill="white" opacity="0.35"/>
  <!-- Center selected — ring + dot -->
  <circle cx="190" cy="58.5" r="3.5" fill="none" stroke="#6366F1" stroke-width="1"/>
  <circle cx="190" cy="58.5" r="1.8" fill="white"/>

  <!-- Label -->
  <text x="179" y="80" font-family="Arial, sans-serif" font-size="11" fill="#64748b">16px</text>

  <!-- ══════════════════════
       Full-size icon (120x120) for reference
  ══════════════════════ -->
  <rect x="270" y="10" width="120" height="120" rx="24" fill="#0F172A"/>
  <!-- Left -->
  <circle cx="296" cy="62" r="9.5" fill="white" opacity="0.28"/>
  <path d="M 282 88 Q 296 78 310 88" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.28"/>
  <!-- Right -->
  <circle cx="364" cy="62" r="9.5" fill="white" opacity="0.28"/>
  <path d="M 350 88 Q 364 78 378 88" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" opacity="0.28"/>
  <!-- Center selected -->
  <circle cx="330" cy="60" r="26" fill="#6366F1" opacity="0.12"/>
  <circle cx="330" cy="60" r="23" fill="none" stroke="#6366F1" stroke-width="2.8"/>
  <circle cx="330" cy="60" r="14" fill="white"/>
  <path d="M 310 88 Q 330 76 350 88" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Badge -->
  <circle cx="347" cy="77" r="9" fill="#0F172A"/>
  <circle cx="347" cy="77" r="7.5" fill="#6366F1"/>
  <path d="M 343.5 77 L 346 79.5 L 351.5 73.5" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="295" y="145" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Full icon</text>

</svg>
