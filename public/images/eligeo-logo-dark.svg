<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">

  <!-- Dark background -->
  <rect width="520" height="120" fill="#0F172A"/>

  <!-- ── Icon Mark: rounded square, lighter fill to stand out on dark bg ── -->
  <rect x="10" y="10" width="100" height="100" rx="20" fill="#1E293B"/>

  <!-- Bar 1 -->
  <rect x="24" y="32" width="62" height="5" rx="2.5" fill="white" opacity="0.2"/>
  <!-- Bar 2 -->
  <rect x="24" y="51" width="44" height="5" rx="2.5" fill="white" opacity="0.45"/>
  <!-- Bar 3 -->
  <rect x="24" y="70" width="28" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Selection dot -->
  <circle cx="62" cy="72.5" r="12" fill="#818CF8" opacity="0.2"/>
  <circle cx="62" cy="72.5" r="8" fill="#818CF8"/>
  <circle cx="62" cy="72.5" r="3.5" fill="white"/>

  <!-- ── Wordmark: white on dark ── -->
  <text
    x="132"
    y="79"
    font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="54"
    font-weight="600"
    letter-spacing="-1.5"
    fill="#F8FAFC"
  >Eligeo</text>

</svg>
