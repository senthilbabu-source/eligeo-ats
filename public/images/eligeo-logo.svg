<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 120" width="540" height="120">

  <!-- White background -->
  <rect width="540" height="120" fill="#ffffff"/>

  <!-- ── Icon: dark rounded square ── -->
  <rect x="8" y="8" width="104" height="104" rx="22" fill="#0F172A"/>

  <!-- ────────────────────────────────
       LEFT candidate (unselected)
  ──────────────────────────────── -->
  <!-- Head -->
  <circle cx="28" cy="46" r="8" fill="white" opacity="0.28"/>
  <!-- Shoulders -->
  <path d="M 14 70 Q 28 61 42 70"
        fill="none" stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.28"/>

  <!-- ────────────────────────────────
       RIGHT candidate (unselected)
  ──────────────────────────────── -->
  <!-- Head -->
  <circle cx="92" cy="46" r="8" fill="white" opacity="0.28"/>
  <!-- Shoulders -->
  <path d="M 78 70 Q 92 61 106 70"
        fill="none" stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.28"/>

  <!-- ────────────────────────────────
       CENTER candidate (THE CHOSEN ONE)
  ──────────────────────────────── -->

  <!-- Outer soft glow -->
  <circle cx="60" cy="46" r="22" fill="#6366F1" opacity="0.12"/>

  <!-- Selection ring — the hero element -->
  <circle cx="60" cy="46" r="19"
          fill="none" stroke="#6366F1" stroke-width="2.5"/>

  <!-- Head — full white, prominent -->
  <circle cx="60" cy="46" r="12" fill="white"/>

  <!-- Shoulders — slightly bolder than unselected -->
  <path d="M 43 72 Q 60 62 77 72"
        fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round"/>

  <!-- ── Checkmark badge (bottom-right of ring) ── -->
  <!-- Badge background circle -->
  <circle cx="74" cy="60" r="7" fill="#0F172A"/>
  <circle cx="74" cy="60" r="6" fill="#6366F1"/>
  <!-- Checkmark path -->
  <path d="M 71 60 L 73.2 62.2 L 77.5 57.5"
        fill="none" stroke="white"
        stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- ────────────────────────────────
       WORDMARK
  ──────────────────────────────── -->
  <text
    x="132" y="76"
    font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="600"
    letter-spacing="-1.5"
    fill="#0F172A"
  >Eligeo</text>

</svg>
