<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">

  <!-- White background -->
  <rect width="520" height="120" fill="#ffffff"/>

  <!-- ── Icon Mark: rounded square ── -->
  <rect x="10" y="10" width="100" height="100" rx="20" fill="#0F172A"/>

  <!-- Selection funnel: 3 bars, fading in opacity top→bottom = many→few→one -->

  <!-- Bar 1: longest, most faint → "all candidates" -->
  <rect x="24" y="32" width="62" height="5" rx="2.5" fill="white" opacity="0.22"/>

  <!-- Bar 2: medium, mid opacity → "shortlisted" -->
  <rect x="24" y="51" width="44" height="5" rx="2.5" fill="white" opacity="0.5"/>

  <!-- Bar 3: short, full white → "finalist" leads into selection dot -->
  <rect x="24" y="70" width="28" height="5" rx="2.5" fill="white"/>

  <!-- Selection dot: the chosen one, sits at end of bar 3 -->
  <!-- Outer glow ring -->
  <circle cx="62" cy="72.5" r="12" fill="#6366F1" opacity="0.18"/>
  <!-- Main dot -->
  <circle cx="62" cy="72.5" r="8" fill="#6366F1"/>
  <!-- Inner white core -->
  <circle cx="62" cy="72.5" r="3.5" fill="white"/>

  <!-- ── Wordmark ── -->
  <text
    x="132"
    y="79"
    font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="54"
    font-weight="600"
    letter-spacing="-1.5"
    fill="#0F172A"
  >Eligeo</text>

</svg>
